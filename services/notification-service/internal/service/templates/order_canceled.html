<!DOCTYPE html>
<html lang="sr">
<head><meta charset="UTF-8"><title>Nalog otkazan</title></head>
<body style="font-family:Arial,sans-serif;background:#f5f5f5;padding:20px">
<div style="max-width:600px;margin:0 auto;background:#fff;border-radius:8px;padding:32px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
  <h2 style="color:#e67e22">EXBanka2 — Nalog otkazan</h2>
  <p>Vaš nalog je otkazan.</p>
  <table style="width:100%;border-collapse:collapse;margin:16px 0">
    <tr><td style="padding:8px;color:#666">Hartija:</td><td style="padding:8px;font-weight:bold">{{index .Data "ticker"}}</td></tr>
    <tr style="background:#f9f9f9"><td style="padding:8px;color:#666">Smer:</td><td style="padding:8px">{{index .Data "direction"}}</td></tr>
    <tr><td style="padding:8px;color:#666">Količina:</td><td style="padding:8px">{{index .Data "quantity"}}</td></tr>
    <tr style="background:#f9f9f9"><td style="padding:8px;color:#666">ID naloga:</td><td style="padding:8px">{{index .Data "order_id"}}</td></tr>
  </table>
  <p style="color:#666;font-size:13px">Rezervisana sredstva su vraćena na Vaš račun.</p>
  <hr style="border:none;border-top:1px solid #eee;margin:24px 0">
  <p style="color:#999;font-size:12px">EXBanka2 — <a href="{{.FrontendURL}}">{{.FrontendURL}}</a></p>
</div>
</body>
</html>
